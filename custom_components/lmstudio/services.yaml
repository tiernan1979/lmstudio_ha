list_models:
  name: List Models
  description: Lists all available models from the connected LM Studio instance. Results are stored in the lmstudio.models state entity.
  fields:

load_model:
  name: Load Model
  description: Loads a specific model into LM Studio. Optionally targets a specific config entry.
  fields:
    model:
      name: Model
      description: The model identifier to load (e.g., lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF).
      required: true
      example: "lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF"
      selector:
        text:
    entry_id:
      name: Entry ID
      description: Optional config entry ID to target. If omitted, the first available entry is used.
      required: false
      example: "abc123def456"
      selector:
        text:

unload_model:
  name: Unload Model
  description: Unloads a loaded model from LM Studio to free up memory.
  fields:
    model:
      name: Model
      description: The model identifier to unload (e.g., lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF).
      required: true
      example: "lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF"
      selector:
        text:
    entry_id:
      name: Entry ID
      description: Optional config entry ID to target. If omitted, the first available entry is used.
      required: false
      example: "abc123def456"
      selector:
        text:

download_model:
  name: Download Model
  description: Triggers a model download from Hugging Face into LM Studio.
  fields:
    model:
      name: Model
      description: The Hugging Face model identifier to download (e.g., lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF).
      required: true
      example: "lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF"
      selector:
        text:
    entry_id:
      name: Entry ID
      description: Optional config entry ID to target. If omitted, the first available entry is used.
      required: false
      example: "abc123def456"
      selector:
        text:

chat:
  name: Chat with Integrations
  description: >-
    Sends a chat message via LM Studio's native API endpoint, optionally wiring in MCP servers or plugins as tool-use integrations. Response is stored in the lmstudio.chat_response state entity.
  fields:
    model:
      name: Model
      description: The model identifier to use for inference. If omitted, uses whatever is currently loaded.
      required: false
      example: "lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF"
      selector:
        text:
    message:
      name: Message
      description: The user message to send.
      required: true
      example: "What's the current temperature in the living room?"
      selector:
        text:
    entry_id:
      name: Entry ID
      description: Optional config entry ID to target. If omitted, the first available entry is used.
      required: false
      example: "abc123def456"
      selector:
        text:
    temperature:
      name: Temperature
      description: Sampling temperature for generation (0-2). Higher = more creative.
      required: false
      default: 0.7
      example: 0.7
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
          unit_of_measurement: ""
    context_length:
      name: Context Length
      description: Maximum context length in tokens (256-131072).
      required: false
      default: 4096
      example: 4096
      selector:
        number:
          min: 256
          max: 131072
          step: 1
          unit_of_measurement: tokens
    integrations:
      name: Integrations
      description: >-
        List of integration objects to attach. Each object requires a "type" field ("ephemeral_mcp" or "plugin"). For "ephemeral_mcp", provide "server_label" and "server_url". Optionally specify "allowed_tools" as a list of tool names.
      required: false
      example: '[{"type": "ephemeral_mcp", "server_label": "home_assistant", "server_url": "http://localhost:8123/api/mcp"}]'
      selector:
        object:

clear_memory:
  name: Clear Memory
  description: Clears the conversation memory for this LM Studio instance.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID to target. If omitted, the first available entry is used.
      required: false
      example: "abc123def456"
      selector:
        text:
    conversation_id:
      name: Conversation ID
      description: Optional specific conversation to clear. If omitted, all conversations are cleared.
      required: false
      example: "home-assistant"
      selector:
        text:
